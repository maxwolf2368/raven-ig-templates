<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1350px; overflow: hidden; background: #0d0d0d; }
body { font-family: 'SF Pro Display', 'Noto Sans TC', 'PingFang TC', sans-serif; }

.gold-bar { position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: linear-gradient(180deg, #C9A227 0%, transparent 75%); }

.bg-text { position: absolute; bottom: 160px; right: -20px; font-size: 320px; font-weight: 900; color: rgba(201,162,39,0.045); line-height: 1; letter-spacing: -8px; user-select: none; }

.header { position: absolute; top: 44px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: center; }
.badge { background: #C9A227; color: #111; font-size: 16px; font-weight: 800; letter-spacing: 4px; padding: 8px 20px; text-transform: uppercase; }
.logo { height: 46px; opacity: 0.7; }

.player-name { position: absolute; top: 130px; left: 60px; font-size: 90px; font-weight: 900; color: #fff; line-height: 1.05; }
.player-en { position: absolute; top: 230px; left: 64px; font-size: 24px; color: #C9A227; font-weight: 600; letter-spacing: 5px; text-transform: uppercase; }

.divider-gold { position: absolute; top: 278px; left: 60px; width: 80px; height: 4px; background: #C9A227; }

.stats { position: absolute; top: 310px; left: 60px; right: 60px; }
.stat-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1c1c1c; padding: 22px 0; }
.sk { font-size: 20px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
.sv { font-size: 24px; color: #fff; font-weight: 600; }
.sv.gold { color: #C9A227; }

.note { position: absolute; top: 910px; left: 60px; right: 60px; font-size: 22px; color: #3a3a3a; line-height: 1.7; border-left: 4px solid #1e1e1e; padding-left: 24px; }

.bottom { position: absolute; bottom: 50px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: flex-end; }
.brand-txt { font-size: 20px; color: #2a2a2a; letter-spacing: 3px; line-height: 1.7; }
.brand-txt span { color: #C9A227; }
.logo-b { height: 40px; opacity: 0.4; }
</style>
